<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter - 自省的空间</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700&display=swap');
        :root {
            --bg: #fdfdfd; --sidebar-bg: #f8f8f8; --text-main: #1a1a1a; --text-dim: #a0a0a0;
            --border: #eeeeee; --accent: #000; --card-bg: #fff;
            --font-title: 'Ma Shan Zheng', cursive; --font-main: 'Noto Serif SC', serif; --font-sans: 'Inter', sans-serif;
            --panel-blur: blur(30px) saturate(150%); --card-radius: 4px; --text-weight: 300; --line-height: 1.8;
        }
        .dark-mode {
            --bg: #050505; --sidebar-bg: #0a0a0a; --text-main: #d1d1d1; --text-dim: #444;
            --border: #1a1a1a; --card-bg: #0d0d0d; --accent: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-align: center; }
        .auth-box { width: 280px; padding: 30px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .auth-logo { font-family: var(--font-title); font-size: 72px; margin-bottom: 20px; letter-spacing: 6px; color: #fff; }
        nav { width: 56px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 2000; }
        .nav-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        main { flex: 1; height: 100%; overflow-y: auto; padding: 60px 5%; position: relative; max-width: 1200px; margin: 0 auto; }
        header h1 { font-family: var(--font-title) !important; font-size: 40px; color: var(--accent); }
        .grid { column-count: 3; column-gap: 40px; margin-top: 40px; }
        @media (max-width: 900px) { .grid { column-count: 1; } }
        .card { break-inside: avoid; margin-bottom: 40px; background: var(--card-bg); border: 1px solid var(--border); padding: 24px; border-radius: var(--card-radius); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; padding: 60px 0; backdrop-filter: var(--panel-blur); overflow-y: auto; }
        .overlay-content { max-width: 800px; margin: 0 auto; width: 90%; }
        .btn-black { background: var(--accent); color: var(--bg); border: none; padding: 12px 28px; font-size: 9px; font-weight: 700; cursor: pointer; border-radius: 20px; }
        .input-line { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 13px; color: var(--text-main); margin-bottom: 15px; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 8px 16px; font-size: 9px; border-radius: 20px; z-index: 11000; display: none; }
    </style>
</head>
<body>
    <div id="toast">SYSTEM READY</div>
    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">Alter.</div>
            <input type="text" id="user-name-in" class="input-line" style="color:#fff; text-align:center;" placeholder="输入登录名...">
            <button class="btn-black" style="background:#fff; color:#000; width:100%;" onclick="enterApp()">连接灵魂</button>
        </div>
    </div>
    <nav>
        <div id="cur-login-name" style="font-size:8px; margin-bottom:20px; opacity:0.5;">NIK</div>
        <div class="nav-link active" onclick="switchView('home')"><i data-lucide="home"></i></div>
        <div class="nav-link" onclick="togglePanel('editor-overlay')"><i data-lucide="feather"></i></div>
        <div class="nav-link" onclick="togglePanel('lab-overlay')"><i data-lucide="beaker"></i></div>
        <div class="nav-link" onclick="togglePanel('settings-overlay')"><i data-lucide="settings"></i></div>
    </nav>
    <main>
        <header>
            <h1 id="view-title">他我笔记</h1>
            <p id="view-subtitle" style="font-size:8px; color:var(--text-dim); letter-spacing:2px;">DASHBOARD / 概览</p>
        </header>
        <div id="dash-view-container">
            <div class="grid" id="note-grid"></div>
        </div>
    </main>

    <div id="editor-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:30px;">封存碎语</h2>
            <textarea id="note-in" class="input-line" style="height:200px; resize:none;" placeholder="在此刻寻找回声..."></textarea>
            <button class="btn-black" onclick="saveNote()">封存回响</button>
            <button onclick="closeOverlay('editor-overlay')" style="background:none; border:none; color:var(--text-dim); margin-left:20px; cursor:pointer;">取消</button>
        </div>
    </div>

    <div id="lab-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:30px;">实验室</h2>
            <p style="font-size:12px; margin-bottom:20px;">在此配置 AI 接口（数据仅保存在本地）</p>
            <input type="password" id="lab-api-key" class="input-line" placeholder="输入 API Key (sk-...)">
            <button class="btn-black" onclick="saveLabSettings()">保存配置</button>
            <button onclick="closeOverlay('lab-overlay')" style="background:none; border:none; color:var(--text-dim); margin-left:20px; cursor:pointer;">关闭</button>
        </div>
    </div>

    <script>
        const FIXED_P = [{n:"他我",i:"🎭"},{n:"乌鸦",i:"🐦"},{n:"影子",i:"🐍"}];
        let notes = JSON.parse(localStorage.getItem('alter_v52_data')) || [];
        let user = localStorage.getItem('alter_v52_user') || "";

        // AI 配置
        const MODEL_CONFIGS = {
            "doubao": { name: "豆包", endpoint: "https://ark.cn-beijing.volces.com/api/v3/chat/completions" },
            "deepseek": { name: "DeepSeek", endpoint: "https://api.deepseek.com/chat/completions" }
        };

        async function callAI(prompt, modelKey = "doubao") {
            const key = localStorage.getItem('alt_api_key');
            if(!key) return alert("请先在实验室设置 API Key");
            try {
                const res = await fetch(MODEL_CONFIGS[modelKey].endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({
                        model: "doubao-pro-32k",
                        messages: [{role: "system", content: "你是一个深刻的AI伙伴。"}, {role: "user", content: prompt}]
                    })
                });
                const data = await res.json();
                return data.choices[0].message.content;
            } catch(e) { return "出错了：" + e.message; }
        }

        function enterApp() {
            const n = document.getElementById('user-name-in').value.trim() || user;
            if(!n) return alert("请输入登录名");
            user = n;
            localStorage.setItem('alter_v52_user', user);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('cur-login-name').innerText = user;
            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('note-grid');
            container.innerHTML = notes.map(n => `<div class="card"><div style="font-size:8px; color:var(--text-dim); margin-bottom:10px;">${n.time}</div><div style="font-family:var(--font-main);">${n.content}</div></div>`).join('') || '<p style="opacity:0.2;">空空如也</p>';
        }

        function saveNote() {
            const content = document.getElementById('note-in').value.trim();
            if(!content) return;
            notes.unshift({ id: Date.now(), content, time: new Date().toLocaleString() });
            localStorage.setItem('alter_v52_data', JSON.stringify(notes));
            document.getElementById('note-in').value = "";
            renderGrid();
            closeOverlay('editor-overlay');
            showMsg("已封存");
        }

        function saveLabSettings() {
            const key = document.getElementById('lab-api-key').value.trim();
            if(key) {
                localStorage.setItem('alt_api_key', key);
                showMsg("API 配置已保存");
            }
        }

        function togglePanel(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function showMsg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }
        function switchView(v) { renderGrid(); }

        window.onload = () => {
            if(user) enterApp();
            if(window.lucide) lucide.createIcons();
        };
    </script>
</body>
</html>
