<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter - 自省的空间</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700&display=swap');

        :root {
            --bg: #fdfdfd;
            --sidebar-bg: #f8f8f8;
            --text-main: #1a1a1a;
            --text-dim: #a0a0a0;
            --border: #eeeeee;
            --accent: #000;
            --card-bg: #fff;
            --font-title: 'Ma Shan Zheng', cursive;
            --font-main: 'Noto Serif SC', serif;
            --font-sans: 'Inter', sans-serif;
            --panel-blur: blur(30px) saturate(150%);
            --card-radius: 4px;
            --text-weight: 300;
            --line-height: 1.8;
        }

        .dark-mode {
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --text-main: #d1d1d1;
            --text-dim: #444;
            --border: #1a1a1a;
            --card-bg: #0d0d0d;
            --accent: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; background-size: cover; background-position: center; }

        /* --- 认证界面 --- */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-align: center; }
        .auth-box { width: 320px; padding: 40px; }
        .auth-logo { font-family: var(--font-title); font-size: 56px; margin-bottom: 20px; letter-spacing: 6px; }

        /* --- 导航侧边栏 --- */
        nav { width: 56px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 0; z-index: 2000; flex-shrink: 0; }
        .logo { width: 22px; height: 22px; margin-bottom: 50px; cursor: pointer; color: var(--accent); }
        .nav-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; position: relative; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        .nav-link.active::after { content: ''; position: absolute; right: -28px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        /* --- 主内容画布 --- */
        main { flex: 1; height: 100%; overflow-y: auto; padding: 60px 10%; scroll-behavior: smooth; position: relative; }
        header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 60px; }
        header h1 { font-family: var(--font-title); font-size: 40px; font-weight: 400; color: var(--accent); }

        .header-tools { display: flex; align-items: center; gap: 20px; position: relative; }
        
        .search-container { position: relative; display: flex; align-items: center; }
        .search-input-wrap { 
            position: absolute; right: 35px; width: 0; opacity: 0; 
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            overflow: hidden; background: var(--card-bg); 
            border: 1px solid var(--border); border-radius: 20px; 
            display: flex; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            backdrop-filter: var(--panel-blur);
            z-index: 100;
        }
        .search-input-wrap.active { width: 240px; opacity: 1; padding: 8px 18px; }
        .search-input-wrap input { background: transparent; border: none; font-size: 13px; width: 100%; color: var(--text-main); }
        .search-trigger { cursor: pointer; color: var(--text-dim); transition: 0.3s; position: relative; z-index: 101; }

        .grid { column-count: 3; column-gap: 40px; }
        @media (max-width: 1400px) { .grid { column-count: 2; } }
        @media (max-width: 900px) { .grid { column-count: 1; } }

        /* --- 卡片模板 --- */
        .card { break-inside: avoid; margin-bottom: 40px; background: var(--card-bg); border: 1px solid var(--border); padding: 24px; transition: 0.4s ease; cursor: pointer; border-radius: var(--card-radius); position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
        .card-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; margin-bottom: 20px; filter: grayscale(100%); transition: 0.6s; border-radius: 2px; }
        .card:hover .card-img { filter: grayscale(0%) !important; }
        
        .card.tmpl-quote { border-left: 5px solid var(--accent); background: rgba(0,0,0,0.01); }
        .card.tmpl-dark { background: var(--accent); color: var(--bg); }
        .card.tmpl-dark .card-meta, .card.tmpl-dark .card-info, .card.tmpl-dark .card-content { color: var(--bg); }
        .card.tmpl-vertical .card-content { writing-mode: vertical-rl; min-height: 200px; margin: 0 auto; letter-spacing: 4px; line-height: 2.5; max-height: 350px; text-align: left; }
        .card.tmpl-serif .card-content { font-family: var(--font-title); font-size: 28px; text-align: center; line-height: 1.3; }

        .card-meta { font-size: 8px; color: var(--text-dim); margin-bottom: 15px; font-weight: 700; text-transform: uppercase; display: flex; justify-content: space-between; }
        .card-content { font-family: var(--font-main); font-size: 15px; line-height: var(--line-height); font-weight: var(--text-weight); color: var(--text-main); white-space: pre-wrap; max-height: 180px; overflow: hidden; mask-image: linear-gradient(to bottom, black 60%, transparent 100%); }
        .card-footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .footer-btn { background: none; border: none; color: var(--text-dim); font-size: 9px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .card-info { font-size: 8px; color: var(--text-dim); font-weight: 700; letter-spacing: 1px; }

        /* --- 覆盖层 --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; padding: 60px 0; backdrop-filter: var(--panel-blur); overflow-y: auto; }
        .overlay-content { max-width: 800px; margin: 0 auto; width: 90%; padding-bottom: 120px; }
        
        .panel-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 60px; position: sticky; top: 0; background: inherit; z-index: 10; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .close-btn { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); cursor: pointer; font-weight: 700; text-transform: uppercase; }

        /* --- 相机补丁 --- */
        #cam-overlay { z-index: 9999; background: #000; padding: 0; justify-content: center; align-items: center; }
        .cam-controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; z-index: 10000; }
        .shutter-ring { width: 75px; height: 75px; border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-ring::after { content: ''; width: 58px; height: 58px; background: #fff; border-radius: 50%; }

        /* 仪表盘 */
        .dash-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 60px; }
        .dash-card { padding: 40px; border: 1px solid var(--border); border-radius: 2px; background: rgba(0,0,0,0.005); }
        .dash-card h4 { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 12px; }
        .dash-card p { font-size: 32px; font-family: var(--font-title); color: var(--accent); }

        .p-picker { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .p-chip { font-size: 10px; padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; opacity: 0.5; transition: 0.2s; white-space: nowrap; }
        .p-chip.active { opacity: 1; border-color: var(--accent); color: var(--accent); font-weight: 700; background: rgba(0,0,0,0.02); }

        .btn-black { background: var(--accent); color: var(--bg); border: none; padding: 14px 32px; font-size: 10px; font-weight: 700; letter-spacing: 2px; cursor: pointer; border-radius: 2px; }
        .input-line { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 14px; color: var(--text-main); margin-bottom: 20px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="theme-default">

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">Alter.</div>
            <p style="font-size:10px; letter-spacing:5px; opacity:0.5; margin-bottom:50px;">PERSONAL ARCHIVE SYSTEM</p>
            <input type="text" id="user-name-in" class="input-line" style="color:#fff; border-color:#333; text-align:center; margin-bottom:30px;" placeholder="在此输入登录花名...">
            <button class="btn-black" style="background:#fff; color:#000; width:100%; border-radius:20px;" onclick="enterApp()">连接灵魂</button>
        </div>
    </div>

    <nav>
        <div class="logo" onclick="switchView('home', this)"><svg viewBox="0 0 100 100" fill="none"><path d="M50 20L80 80H20L50 20Z" stroke="currentColor" stroke-width="4"/><path d="M50 85L65 55H35L50 85Z" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/></svg></div>
        <div class="nav-link active" onclick="switchView('home', this)" title="概览"><i data-lucide="home"></i></div>
        <div class="nav-link" onclick="switchView('timeline', this)" title="主页"><i data-lucide="layout"></i></div>
        <div class="nav-link" onclick="handleVaultAccess(this)" id="nav-vault" title="碎片"><i data-lucide="sparkles"></i></div>
        <div class="nav-link" onclick="togglePanel('reflect-overlay')" title="心灵回想"><i data-lucide="scan-eye"></i></div>
        <div class="nav-link" onclick="togglePanel('lab-overlay')" title="实验室"><i data-lucide="beaker"></i></div>
        <div style="flex:1"></div>
        <div class="nav-link" onclick="togglePanel('editor-overlay')" title="封存"><i data-lucide="feather"></i></div>
        <div class="nav-link" onclick="togglePanel('settings-overlay')" title="个人"><i data-lucide="settings"></i></div>
    </nav>

    <main id="main">
        <header>
            <div>
                <h1 id="view-title">他我笔记</h1>
                <p style="font-size: 8px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: 8px;" id="view-subtitle">Dashboard / 概览</p>
            </div>
            <div class="header-tools">
                <div class="search-container">
                    <div class="search-input-wrap" id="search-wrap">
                        <input type="text" id="searchInput" placeholder="搜索碎语..." oninput="handleSearch()">
                    </div>
                    <div class="search-trigger" onclick="toggleSearch()"><i data-lucide="search" size="18"></i></div>
                </div>
                <button id="synth-btn" class="btn-black" style="display:none; padding:8px 16px; font-size:9px;" onclick="synthesize()">碎片合成</button>
            </div>
        </header>

        <div id="dash-view-container">
            <div class="dash-row">
                <div class="dash-card"><h4>今日独白</h4><p id="count-today">0</p></div>
                <div class="dash-card"><h4>当前登录</h4><p id="current-user-tag">UNSET</p></div>
                <div class="dash-card"><h4>化身状态</h4><p>活跃</p></div>
            </div>
            <div style="margin-top:40px;">
                <h3 style="font-size: 10px; letter-spacing: 3px; margin-bottom: 30px; opacity:0.5;">DAILY RECALL / 每日回顾</h3>
                <div id="review-box" style="max-width: 600px;"></div>
            </div>
        </div>

        <div id="timeline-container" style="display:none;">
            <div class="grid" id="note-grid"></div>
        </div>
    </main>

    <div id="cam-overlay" class="overlay">
        <div onclick="camOff()" style="position:fixed; top:40px; right:40px; cursor:pointer; z-index:10001;"><i data-lucide="x" size="24" color="#fff"></i></div>
        <video id="v-stream" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        <div class="cam-controls">
            <div class="shutter-ring" onclick="snap()"></div>
        </div>
        <canvas id="v-canvas" style="display:none;"></canvas>
    </div>

    <div id="editor-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header"><div id="p-sel-box" style="display:flex; gap:12px;"></div><span class="close-btn" onclick="closeOverlay('editor-overlay')">CLOSE</span></div>
            <div style="display:flex; gap:30px; border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:30px;">
                <input type="text" id="note-tag" placeholder="# 标签" style="background:transparent; border:none; font-size:12px; flex:1;">
                <input type="text" id="note-folder" placeholder="📁 文件夹" style="background:transparent; border:none; font-size:12px; flex:1;">
            </div>
            <textarea id="note-in" class="input-line" style="height:350px; font-family:var(--font-main); font-size:20px; line-height:2.2; border:none; resize:none;" placeholder="在此刻寻找回声..."></textarea>
            <div id="prevBox" style="display:none; margin-bottom:20px; position:relative;"><img src="" id="pImg" style="width:100%; border-radius:4px;"><div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; border-radius:50%; width:24px; height:24px; text-align:center; line-height:24px; cursor:pointer;" onclick="killImg()">×</div></div>
            <div style="display:flex; justify-content: space-between; border-top:1px solid var(--border); padding-top:30px;">
                <div style="display:flex; gap:30px;">
                    <i data-lucide="camera" style="cursor:pointer; color:var(--text-dim)" onclick="camOn()"></i>
                    <i data-lucide="image" style="cursor:pointer; color:var(--text-dim)" onclick="document.getElementById('f-in').click()"></i>
                    <input type="file" id="f-in" hidden accept="image/*" onchange="upFile(event)">
                    <i data-lucide="shield" id="vaultToggle" style="cursor:pointer; color:var(--text-dim)" onclick="toggleVault()"></i>
                </div>
                <button class="btn-black" onclick="save()">封存回响</button>
            </div>
        </div>
    </div>

    <div id="reader-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header"><h2>内容回想</h2><span class="close-btn" onclick="closeOverlay('reader-overlay')">BACK</span></div>
            <div id="reader-target" style="padding-bottom:100px;"></div>
            <div style="margin-top:40px; padding-top:30px; border-top:1px solid var(--border);">
                <div id="replies-box"></div>
                <div style="margin-top:30px;">
                    <div id="r-p-picker" class="p-picker"></div>
                    <input type="text" id="comIn" class="input-line" placeholder="写下回响...">
                    <button class="btn-black" id="sendBtn" style="width:100%;">同步回响</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay"><div class="overlay-content"><div class="panel-header"><h2>个人设置</h2><span class="close-btn" onclick="closeOverlay('settings-overlay')">CLOSE</span></div><button class="btn-black" style="width:100%" onclick="dlData()">导出备份 (.JSON)</button></div></div>
    <div id="reflect-overlay" class="overlay"><div class="overlay-content"><div class="panel-header"><h2>心灵回想</h2><span class="close-btn" onclick="closeOverlay('reflect-overlay')">CLOSE</span></div><div id="reflect-report">分析需要接入 API Key。</div></div></div>
    <div id="lab-overlay" class="overlay"><div class="overlay-content"><div class="panel-header"><h2>实验室</h2><span class="close-btn" onclick="closeOverlay('lab-overlay')">CLOSE</span></div><p>实验室正常运行中。</p></div></div>

    <script>
        const FIXED_P = [{n:"他我",i:"🎭"},{n:"乌鸦",i:"🐦"},{n:"影子",i:"🐍"}];
        let notes = JSON.parse(localStorage.getItem('alter_v51_data')) || [];
        let sec = JSON.parse(localStorage.getItem('alter_v51_sec')) || { v: "" };
        let user = localStorage.getItem('alter_v51_user') || "", viewMode = 'home', activeP = FIXED_P[0], commP = FIXED_P[0], inV = false, b64 = "", stream = null;

        function init() { lucide.createIcons(); if(!user) document.getElementById('auth-screen').style.display='flex'; else enterApp(user); }
        function enterApp(name) { user = name || document.getElementById('user-name-in').value.trim(); if(!user) return; localStorage.setItem('alter_v51_user', user); document.getElementById('auth-screen').style.display='none'; document.getElementById('current-user-tag').innerText = `@${user.toUpperCase()}`; renderAll(); }
        function renderAll() { renderGrid(); renderSwitcher(); updateStats(); renderDailyReview(); lucide.createIcons(); }

        function renderSwitcher() {
            document.getElementById('p-sel-box').innerHTML = FIXED_P.map(p => `<span style="font-size:10px; cursor:pointer; opacity:${activeP.n===p.n?'1':'0.4'}" onclick="activeP=FIXED_P.find(x=>x.n==='${p.n}');renderSwitcher()">${p.i} ${p.n}</span>`).join('');
            const rBox = document.getElementById('r-p-picker'); if(rBox) rBox.innerHTML = FIXED_P.map(p => `<div class="p-chip ${commP.n===p.n?'active':''}" onclick="commP=FIXED_P.find(x=>x.n==='${p.n}');renderSwitcher()">${p.i} ${p.n}</div>`).join('');
        }

        function updateStats() { document.getElementById('count-today').innerText = notes.filter(n => n.time === new Date().toLocaleDateString()).length; }
        
        function save() {
            const t = document.getElementById('note-in').value.trim(); if(!t && !b64) return closeOverlay('editor-overlay');
            notes.unshift({ id:Date.now(), content:t, image:b64, isVault:inV, persona:activeP.n, i:activeP.i, time:new Date().toLocaleDateString(), zs:0, replies:[] });
            localStorage.setItem('alter_v51_data', JSON.stringify(notes)); renderAll(); closeOverlay('editor-overlay'); document.getElementById('note-in').value=''; b64=""; document.getElementById('prevBox').style.display='none';
        }

        function renderGrid() {
            const grid = document.getElementById('note-grid'); if(!grid) return; grid.innerHTML = '';
            notes.filter(n => (viewMode === 'vault' ? n.isVault : !n.isVault)).forEach(n => {
                const div = document.createElement('div'); div.className = `card ${n.isVault?'tmpl-quote':''}`; div.onclick = () => showNote(n);
                div.innerHTML = `${n.image?`<img src="${n.image}" class="card-img">`:''}<div class="card-meta"><span>${n.i} ${n.persona}</span><span>${n.time}</span></div><div class="card-content">${n.content}</div><div class="card-footer"><span onclick="event.stopPropagation(); doZap(${n.id})"><i data-lucide="zap" size="10"></i> ${n.zs||0}</span><span>${n.replies?.length||0} ECHOES</span></div>`;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        function showNote(n) {
            document.getElementById('reader-target').innerHTML = `<p style="font-size:18px;line-height:2.2;">${n.content}</p>${n.image?`<img src="${n.image}" style="width:100%;margin-top:20px;">`:''}`;
            document.getElementById('replies-box').innerHTML = (n.replies || []).map(r => `<div style="margin-top:10px;padding:10px;background:rgba(0,0,0,0.02);font-size:13px;"><b>${r.who}:</b> ${r.txt}</div>`).join('') || '<p style="opacity:0.2;font-size:10px;">暂无回响</p>';
            document.getElementById('sendBtn').onclick = () => { const txt = document.getElementById('comIn').value.trim(); if(!txt) return; n.replies.push({who:commP.n, txt:txt}); localStorage.setItem('alter_v51_data', JSON.stringify(notes)); document.getElementById('comIn').value=''; showNote(n); renderGrid(); };
            togglePanel('reader-overlay'); renderSwitcher();
        }

        function renderDailyReview() { const box = document.getElementById('review-box'); if(!box || notes.length===0) return; const r = notes[Math.floor(Math.random()*notes.length)]; box.innerHTML = `<h3 style="font-size:10px;opacity:0.3;margin-bottom:20px;">DAILY RECALL</h3><div class="card tmpl-quote" style="width:100%" onclick="showNoteById(${r.id})"><div class="card-content">${r.content}</div></div>`; }
        function switchView(m, el) { viewMode = m; document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); el.classList.add('active'); document.getElementById('dash-view-container').style.display = m==='home'?'block':'none'; document.getElementById('timeline-container').style.display = (m==='timeline'||m==='vault')?'block':'none'; renderGrid(); }
        function togglePanel(id) { document.querySelectorAll('.overlay').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='flex'; lucide.createIcons(); }
        function closeOverlay(id) { document.getElementById(id).style.display='none'; }
        function toggleVault() { inV=!inV; document.getElementById('vaultToggle').style.color=inV?'#000':'#a0a0a0'; }
        function handleVaultAccess(el) { if(sec.v && prompt("密码:")!==sec.v) return; switchView('vault', el); }
        async function camOn() { try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); document.getElementById('v-stream').srcObject = stream; document.getElementById('cam-overlay').style.display = 'flex'; } catch (e) { alert("无相机权限"); } }
        function camOff() { if(stream) stream.getTracks().forEach(t=>t.stop()); document.getElementById('cam-overlay').style.display='none'; }
        function snap() { const v = document.getElementById('v-stream'), c = document.getElementById('v-canvas'); c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0); b64 = c.toDataURL('image/jpeg'); document.getElementById('pImg').src = b64; document.getElementById('prevBox').style.display = 'block'; camOff(); }
        function doZap(id) { const n = notes.find(x=>x.id===id); if(n){ n.zs=(n.zs||0)+1; localStorage.setItem('alter_v51_data', JSON.stringify(notes)); renderGrid(); } }
        function dlData() { const a = document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(notes)], {type:'application/json'})); a.download='alter.json'; a.click(); }
        function killImg() { b64=""; document.getElementById('prevBox').style.display='none'; }
        function showNoteById(id) { const n = notes.find(x=>x.id===id); if(n) showNote(n); }
        window.addEventListener('load', init);
    </script>
</body>
</html>
