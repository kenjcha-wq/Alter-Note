<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter - 自省的空间</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700&display=swap');
        :root {
            --bg: #fdfdfd; --sidebar-bg: #f8f8f8; --text-main: #1a1a1a; --text-dim: #a0a0a0;
            --border: #eeeeee; --accent: #000; --card-bg: #fff;
            --font-title: 'Ma Shan Zheng', cursive; --font-main: 'Noto Serif SC', serif; --font-sans: 'Inter', sans-serif;
            --panel-blur: blur(30px) saturate(150%); --card-radius: 4px; --text-weight: 300; --line-height: 1.8;
        }
        .dark-mode {
            --bg: #050505; --sidebar-bg: #0a0a0a; --text-main: #d1d1d1; --text-dim: #444;
            --border: #1a1a1a; --card-bg: #0d0d0d; --accent: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); display: flex; height: 100vh; overflow: hidden; }
        
        /* 认证 */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-align: center; }
        .auth-box { width: 280px; padding: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        
        /* 导航 */
        nav { width: 56px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 2000; flex-shrink: 0; }
        .nav-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; position: relative; }
        .nav-link.active { color: var(--accent); }
        .nav-link.active::after { content:''; position:absolute; right:-28px; width:4px; height:4px; background:var(--accent); border-radius:50%; }

        /* 内容区 */
        main { flex: 1; height: 100%; overflow-y: auto; padding: 60px 5%; position: relative; max-width: 1200px; margin: 0 auto; scroll-behavior: smooth; }
        header { margin-bottom: 60px; }
        header h1 { font-family: var(--font-title) !important; font-size: 40px; color: var(--accent); }
        
        /* 瀑布流 */
        .grid { column-count: 3; column-gap: 40px; }
        @media (max-width: 1000px) { .grid { column-count: 2; } }
        @media (max-width: 600px) { .grid { column-count: 1; } }
        
        .card { break-inside: avoid; margin-bottom: 40px; background: var(--card-bg); border: 1px solid var(--border); padding: 24px; border-radius: var(--card-radius); transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--accent); }
        .card-meta { font-size: 8px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .card-content { font-family: var(--font-main); font-size: 15px; line-height: 1.8; color: var(--text-main); white-space: pre-wrap; }

        /* 覆盖层 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; padding: 60px 0; backdrop-filter: var(--panel-blur); overflow-y: auto; }
        .overlay-content { max-width: 800px; margin: 0 auto; width: 90%; }
        
        .btn-black { background: var(--accent); color: var(--bg); border: none; padding: 12px 28px; font-size: 9px; font-weight: 700; letter-spacing: 2px; cursor: pointer; border-radius: 20px; text-transform: uppercase; }
        .input-line { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 14px; color: var(--text-main); margin-bottom: 20px; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 8px 16px; font-size: 9px; border-radius: 20px; z-index: 11000; display: none; }
    </style>
</head>
<body>

    <div id="toast">SYSTEM SYNCED</div>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo" style="font-family:var(--font-title); font-size:72px;">Alter.</div>
            <input type="text" id="user-name-in" class="input-line" style="color:#fff; text-align:center;" placeholder="输入登录名...">
            <button class="btn-black" style="background:#fff; color:#000; width:100%;" onclick="enterApp()">连接灵魂</button>
        </div>
    </div>

    <nav>
        <div id="cur-login-name" style="font-size:8px; margin-bottom:20px; opacity:0.5; text-transform:uppercase;">NIK</div>
        <div class="nav-link active" onclick="switchView('home', this)"><i data-lucide="home"></i></div>
        <div class="nav-link" onclick="switchView('timeline', this)"><i data-lucide="layout"></i></div>
        <div class="nav-link" onclick="togglePanel('editor-overlay')"><i data-lucide="feather"></i></div>
        <div class="nav-link" onclick="togglePanel('lab-overlay')"><i data-lucide="beaker"></i></div>
        <div class="nav-link" onclick="togglePanel('settings-overlay')"><i data-lucide="settings"></i></div>
    </nav>

    <main>
        <header>
            <h1 id="view-title">他我笔记</h1>
            <p id="view-subtitle" style="font-size:8px; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase;">DASHBOARD / 概览</p>
        </header>

        <div id="home-container">
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:60px;">
                <div style="padding:40px; border:1px solid var(--border); text-align:center;">
                    <h4 style="font-size:10px; color:var(--text-dim); margin-bottom:10px;">碎片总量</h4>
                    <p id="stat-total" style="font-family:var(--font-main);">0</p>
                </div>
                <div style="padding:40px; border:1px solid var(--border); text-align:center;">
                    <h4 style="font-size:10px; color:var(--text-dim); margin-bottom:10px;">化身状态</h4>
                    <p style="font-family:var(--font-main);">活跃</p>
                </div>
                <div style="padding:40px; border:1px solid var(--border); text-align:center;">
                    <h4 style="font-size:10px; color:var(--text-dim); margin-bottom:10px;">同步状态</h4>
                    <p style="font-family:var(--font-main);">Cloudflare</p>
                </div>
            </div>
        </div>

        <div id="timeline-container" style="display:none;">
            <div class="grid" id="note-grid"></div>
        </div>
    </main>

    <div id="editor-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:40px;">封存碎语</h2>
            <textarea id="note-in" class="input-line" style="height:300px; resize:none; font-family:var(--font-main); font-size:18px; line-height:2;" placeholder="在此刻寻找回声..."></textarea>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button class="btn-black" onclick="saveNote()">封存回响</button>
                <span style="font-size:10px; color:var(--text-dim); cursor:pointer;" onclick="closeOverlay('editor-overlay')">CANCEL</span>
            </div>
        </div>
    </div>

    <div id="lab-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:20px;">实验室</h2>
            <p style="font-size:11px; color:var(--text-dim); margin-bottom:40px;">AI 逻辑配置中心 (数据加密存储在本地)</p>
            <div style="margin-bottom:40px;">
                <h3 style="font-size:10px; letter-spacing:2px; margin-bottom:20px; opacity:0.5;">API SETTINGS</h3>
                <input type="password" id="lab-api-key" class="input-line" placeholder="输入 API Key (sk-...)">
            </div>
            <button class="btn-black" onclick="saveLab()">保存配置</button>
            <button class="btn-black" style="background:none; color:var(--text-dim); margin-left:10px;" onclick="closeOverlay('lab-overlay')">关闭</button>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:40px;">个人中心</h2>
            <button class="btn-black" style="width:100%; margin-bottom:20px;" onclick="exportData()">导出备份 (.JSON)</button>
            <button class="btn-black" style="width:100%; background:red; color:#fff;" onclick="localStorage.clear(); location.reload();">清除所有本地数据</button>
            <p style="text-align:center; margin-top:40px; font-size:10px; color:var(--text-dim); cursor:pointer;" onclick="closeOverlay('settings-overlay')">CLOSE</p>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('alter_v52_data')) || [];
        let user = localStorage.getItem('alter_v52_user') || "";

        function enterApp() {
            const n = document.getElementById('user-name-in').value.trim() || user;
            if(!n) return alert("请输入登录名");
            user = n;
            localStorage.setItem('alter_v52_user', user);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('cur-login-name').innerText = user;
            renderAll();
        }

        function switchView(mode, el) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
            
            const isHome = mode === 'home';
            document.getElementById('home-container').style.display = isHome ? 'block' : 'none';
            document.getElementById('timeline-container').style.display = isHome ? 'none' : 'block';
            
            document.getElementById('view-title').innerText = isHome ? "他我笔记" : "碎语时光";
            document.getElementById('view-subtitle').innerText = isHome ? "DASHBOARD / 概览" : "TIMELINE / 列表";
            
            if(!isHome) renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('note-grid');
            if(notes.length === 0) {
                container.innerHTML = '<p style="opacity:0.2; font-size:12px; letter-spacing:2px;">此刻虚无。</p>';
                return;
            }
            container.innerHTML = notes.map(n => `
                <div class="card">
                    <div class="card-meta"><span>${n.time}</span></div>
                    <div class="card-content">${n.content}</div>
                </div>
            `).join('');
        }

        function saveNote() {
            const txt = document.getElementById('note-in').value.trim();
            if(!txt) return;
            notes.unshift({ id: Date.now(), content: txt, time: new Date().toLocaleString() });
            localStorage.setItem('alter_v52_data', JSON.stringify(notes));
            document.getElementById('note-in').value = "";
            showMsg("已封存回响");
            renderAll();
            closeOverlay('editor-overlay');
        }

        function saveLab() {
            const key = document.getElementById('lab-api-key').value.trim();
            if(key) { localStorage.setItem('alt_api_key', key); showMsg("API KEY SAVED"); }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(notes)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `alter_backup_${Date.now()}.json`;
            a.click();
        }

        function renderAll() {
            document.getElementById('stat-total').innerText = notes.length;
            renderGrid();
        }

        function togglePanel(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function showMsg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        window.onload = () => {
            if(user) enterApp();
            if(window.lucide) lucide.createIcons();
        }
    </script>
</body>
</html>
