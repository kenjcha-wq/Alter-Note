<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter - 自省的空间</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700&display=swap');
        :root {
            --bg: #fdfdfd; --sidebar-bg: #f8f8f8; --text-main: #1a1a1a; --text-dim: #a0a0a0;
            --border: #eeeeee; --accent: #000; --card-bg: #fff;
            --font-title: 'Ma Shan Zheng', cursive; --font-main: 'Noto Serif SC', serif; --font-sans: 'Inter', sans-serif;
            --panel-blur: blur(30px) saturate(150%); --card-radius: 4px; --text-weight: 300; --line-height: 1.8;
        }
        .dark-mode { --bg: #050505; --sidebar-bg: #0a0a0a; --text-main: #d1d1d1; --text-dim: #444; --border: #1a1a1a; --card-bg: #0d0d0d; --accent: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; background-size: cover; background-position: center; }
        
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-align: center; }
        .auth-box { width: 280px; padding: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-logo { font-family: var(--font-title); font-size: 72px; margin-bottom: 20px; letter-spacing: 6px; color: #fff; }

        nav { width: 56px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0 40px 0; z-index: 2000; flex-shrink: 0; }
        #cur-login-name { font-size: 8px !important; color: var(--text-dim); cursor: default; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; opacity: 0.5; }
        .logo { width: 22px; height: 22px; margin-bottom: 50px; cursor: pointer; color: var(--accent); }
        .nav-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; position: relative; }
        .nav-link:hover, .nav-link.active { color: var(--accent); }
        .nav-link.active::after { content: ''; position: absolute; right: -28px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        main { flex: 1; height: 100%; overflow-y: auto; padding: 60px 5%; scroll-behavior: smooth; position: relative; max-width: 1200px; margin: 0 auto; }
        header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 60px; }
        header h1 { font-family: var(--font-title) !important; font-size: 40px; font-weight: 400; color: var(--accent); }
        .view-subtitle-meta { font-size: 8px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; font-family: var(--font-sans); }

        .grid { column-count: 3; column-gap: 40px; }
        @media (max-width: 1400px) { .grid { column-count: 2; } }
        @media (max-width: 900px) { .grid { column-count: 1; } }

        .card { break-inside: avoid; margin-bottom: 40px; background: var(--card-bg); border: 1px solid var(--border); padding: 24px; transition: 0.4s ease; cursor: pointer; border-radius: var(--card-radius); position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .card-meta { font-size: 8px; color: var(--text-dim); margin-bottom: 15px; font-weight: 700; text-transform: uppercase; display: flex; justify-content: space-between; }
        .card-content { font-family: var(--font-main) !important; font-size: 15px; line-height: 1.8; font-weight: 300; color: var(--text-main); white-space: pre-wrap; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; padding: 60px 0; backdrop-filter: var(--panel-blur); overflow-y: auto; }
        .overlay-content { max-width: 800px; margin: 0 auto; width: 90%; }
        .btn-black { background: var(--accent); color: var(--bg); border: none; padding: 12px 28px; font-size: 9px; font-weight: 700; letter-spacing: 2px; cursor: pointer; border-radius: 20px; }
        .input-line { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 13px; color: var(--text-main); margin-bottom: 15px; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 8px 16px; font-size: 9px; border-radius: 20px; z-index: 11000; display: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="toast">SYSTEM SYNCED</div>
    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">Alter.</div>
            <p style="font-size:8px; letter-spacing:5px; opacity:0.5; margin-bottom:40px;">PERSONAL ARCHIVE SYSTEM</p>
            <input type="text" id="user-name-in" class="input-line" style="color:#fff; border-color:#444; text-align:center; margin-bottom:25px;" placeholder="在此输入登录名...">
            <button class="btn-black" style="background:#fff; color:#000; width:100%; border-radius:20px;" onclick="enterApp()">连接灵魂</button>
        </div>
    </div>
    <nav>
        <div id="cur-login-name">NIK</div>
        <div class="logo" onclick="switchView('home', this)"><svg viewBox="0 0 100 100" fill="none"><path d="M50 20L80 80H20L50 20Z" stroke="currentColor" stroke-width="4"/><path d="M50 85L65 55H35L50 85Z" stroke="currentColor" stroke-opacity="0.3" stroke-width="2"/></svg></div>
        <div class="nav-link active" onclick="switchView('home', this)"><i data-lucide="home"></i></div>
        <div class="nav-link" onclick="switchView('timeline', this)"><i data-lucide="layout"></i></div>
        <div class="nav-link" onclick="handleVaultAccess(this)"><i data-lucide="sparkles"></i></div>
        <div class="nav-link" onclick="togglePanel('lab-overlay')"><i data-lucide="beaker"></i></div>
        <div style="flex:1"></div>
        <div class="nav-link" onclick="togglePanel('editor-overlay')"><i data-lucide="feather"></i></div>
        <div class="nav-link" onclick="togglePanel('settings-overlay')"><i data-lucide="settings"></i></div>
    </nav>
    <main>
        <header>
            <div>
                <h1 id="view-title">他我笔记</h1>
                <p class="view-subtitle-meta" id="view-subtitle">DASHBOARD / 概览</p>
                <div class="vault-tabs" id="vault-tabs" style="display:none; gap:15px; margin-top:15px;">
                    <span class="v-tab active" onclick="switchVaultMode('soul')">心灵碎片</span>
                    <span class="v-tab" onclick="switchVaultMode('memory')">记忆碎片</span>
                </div>
            </div>
        </header>
        <div id="home-view">
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 60px;">
                <div class="card" style="text-align:center; padding:40px;"><h4>碎片总量</h4><p id="stat-total" style="font-family:var(--font-main); font-size:24px;">0</p></div>
                <div class="card" style="text-align:center; padding:40px;"><h4>当前登录</h4><p id="current-user-tag" style="font-family:var(--font-main);">UNSET</p></div>
                <div class="card" style="text-align:center; padding:40px;"><h4>同步状态</h4><p>活跃</p></div>
            </div>
            <h3 style="font-size:10px; letter-spacing:3px; margin-bottom:30px; opacity:0.5;">DAILY RECALL / 每日回顾</h3>
            <div id="review-box"></div>
        </div><div id="editor-overlay" class="overlay"><div class="overlay-content">
        <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:40px;">封存碎语</h2>
        <textarea id="note-in" class="input-line" style="height:300px; font-size:20px; line-height:2.2; border:none; resize:none; font-family:'Noto Serif SC';" placeholder="在此刻寻找回声..."></textarea>
        <button class="btn-black" onclick="saveNote()">封存回响</button>
        <button onclick="closeOverlay('editor-overlay')" style="background:none; border:none; color:var(--text-dim); margin-left:20px; cursor:pointer;">取消</button>
    </div></div>

    <div id="lab-overlay" class="overlay"><div class="overlay-content">
        <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:20px;">实验室</h2>
        <p style="font-size:11px; color:var(--text-dim); margin-bottom:40px;">AI 接口配置 (仅存在本地浏览器)</p>
        <input type="password" id="lab-key" class="input-line" placeholder="API Key (sk-...)">
        <input type="text" id="lab-model" class="input-line" placeholder="推理终端 ID (豆包 ep-...)">
        <button class="btn-black" onclick="saveLab()">保存配置</button>
        <button onclick="closeOverlay('lab-overlay')" style="background:none; border:none; color:var(--text-dim); margin-left:20px; cursor:pointer;">关闭</button>
    </div></div>

    <div id="settings-overlay" class="overlay"><div class="overlay-content">
        <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:40px;">个人中心</h2>
        <button class="btn-black" style="width:100%; margin-bottom:20px;" onclick="exportData()">导出备份 (.JSON)</button>
        <button class="btn-black" style="width:100%; background:red; color:#fff;" onclick="localStorage.clear(); location.reload();">重置所有数据</button>
        <p onclick="closeOverlay('settings-overlay')" style="text-align:center; margin-top:40px; font-size:10px; cursor:pointer; opacity:0.5;">CLOSE</p>
    </div></div>

    <script>
        let notes = JSON.parse(localStorage.getItem('alter_v52_data')) || [];
        let user = localStorage.getItem('alter_v52_user') || "";
        let viewMode = 'home';

        function enterApp() {
            const n = document.getElementById('user-name-in').value.trim() || user;
            if(!n) return;
            user = n;
            localStorage.setItem('alter_v52_user', user);
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('cur-login-name').innerText = user;
            document.getElementById('current-user-tag').innerText = user;
            renderAll();
        }

        function switchView(mode, el) {
            viewMode = mode;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
            document.getElementById('home-view').style.display = mode === 'home' ? 'block' : 'none';
            document.getElementById('timeline-view').style.display = mode !== 'home' ? 'block' : 'none';
            document.getElementById('view-title').innerText = mode === 'home' ? "他我笔记" : "碎语时光";
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('note-grid');
            if(!grid) return;
            grid.innerHTML = notes.map(n => `<div class="card"><div class="card-meta"><span>${n.time}</span></div><div class="card-content">${n.content}</div></div>`).join('') || '<p style="opacity:0.2;">此刻虚无。</p>';
        }

        function saveNote() {
            const txt = document.getElementById('note-in').value.trim();
            if(!txt) return;
            notes.unshift({ id: Date.now(), content: txt, time: new Date().toLocaleString() });
            localStorage.setItem('alter_v52_data', JSON.stringify(notes));
            document.getElementById('note-in').value = "";
            renderAll(); closeOverlay('editor-overlay'); showMsg("已封存回响");
        }

        function renderAll() {
            document.getElementById('stat-total').innerText = notes.length;
            renderGrid();
            if(notes.length > 0) {
                const r = notes[Math.floor(Math.random()*notes.length)];
                document.getElementById('review-box').innerHTML = `<div class="card"><div class="card-meta"><span>${r.time}</span></div><div class="card-content">${r.content}</div></div>`;
            }
        }

        function saveLab() {
            localStorage.setItem('alt_api_key', document.getElementById('lab-key').value);
            localStorage.setItem('alt_api_model', document.getElementById('lab-model').value);
            showMsg("实验室配置已保存");
        }

        function togglePanel(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function showMsg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }
        
        // 影子 AI 插件
        window.AlterAI = {
            chat: async function(prompt) {
                const key = localStorage.getItem('alt_api_key');
                const model = localStorage.getItem('alt_api_model') || "doubao-pro-32k";
                const res = await fetch("https://ark.cn-beijing.volces.com/api/v3/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: model, messages: [{role:"system", content:"你是一个中肯、深刻的AI伙伴。"}, {role:"user", content:prompt}] })
                });
                const data = await res.json();
                console.log("🎭 他我回响：", data.choices[0].message.content);
                return data.choices[0].message.content;
            }
        };

        window.onload = () => { if(user) enterApp(); lucide.createIcons(); }
    </script>
</body>
</html>        <div id="timeline-view" style="display:none;"><div class="grid" id="note-grid"></div></div>
    </main>
