<div id="editor-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:40px;">封存碎语</h2>
            <textarea id="note-in" class="input-line" style="height:300px; resize:none; font-family:var(--font-main); font-size:20px; line-height:2.2;" placeholder="在此刻寻找回声..."></textarea>
            <button class="btn-black" onclick="saveNote()">封存回响</button>
            <button class="btn-black" style="background:none; color:var(--text-dim);" onclick="closeOverlay('editor-overlay')">CANCEL</button>
        </div>
    </div>

    <div id="lab-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:20px;">实验室</h2>
            <div style="margin-bottom:40px;">
                <h3 style="font-size:10px; opacity:0.5; margin-bottom:20px;">AI 接口配置</h3>
                <input type="password" id="lab-key" class="input-line" placeholder="API Key (sk-...)">
                <input type="text" id="lab-model" class="input-line" placeholder="推理终端 ID (豆包 ep-...)">
            </div>
            <button class="btn-black" onclick="saveLab()">保存配置</button>
            <button class="btn-black" style="background:none; color:var(--text-dim);" onclick="closeOverlay('lab-overlay')">关闭</button>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="font-family:var(--font-title); font-size:32px; margin-bottom:40px;">个人中心</h2>
            <button class="btn-black" style="width:100%; margin-bottom:20px;" onclick="exportData()">导出备份 (.JSON)</button>
            <button class="btn-black" style="width:100%; background:red; color:#fff;" onclick="localStorage.clear(); location.reload();">重置所有数据</button>
            <p onclick="closeOverlay('settings-overlay')" style="text-align:center; margin-top:40px; font-size:10px; cursor:pointer; opacity:0.5;">CLOSE</p>
        </div>
    </div>

    <script>
        const FIXED_P = [{n:"他我",i:"🎭"},{n:"乌鸦",i:"🐦"},{n:"影子",i:"🐍"}];
        let notes = JSON.parse(localStorage.getItem('alter_v52_data')) || [];
        let user = localStorage.getItem('alter_v52_user') || "";

        function enterApp() {
            const n = document.getElementById('user-name-in').value.trim() || user;
            if(!n) return alert("请输入登录名");
            user = n;
            localStorage.setItem('alter_v52_user', user);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('cur-login-name').innerText = user;
            renderAll();
        }

        function switchView(mode, el) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
            const isHome = (mode === 'home');
            document.getElementById('home-container').style.display = isHome ? 'block' : 'none';
            document.getElementById('timeline-container').style.display = isHome ? 'none' : 'block';
            document.getElementById('view-title').innerText = isHome ? "他我笔记" : "碎语时光";
            if(!isHome) renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('note-grid');
            grid.innerHTML = notes.map(n => `
                <div class="card">
                    <div class="card-meta"><span>${n.time}</span></div>
                    <div class="card-content">${n.content}</div>
                </div>
            `).join('') || '<p style="opacity:0.2; letter-spacing:2px;">此刻虚无。</p>';
        }

        function saveNote() {
            const content = document.getElementById('note-in').value.trim();
            if(!content) return;
            notes.unshift({ id: Date.now(), content, time: new Date().toLocaleString() });
            localStorage.setItem('alter_v52_data', JSON.stringify(notes));
            document.getElementById('note-in').value = "";
            renderAll();
            closeOverlay('editor-overlay');
            showMsg("已封存回响");
        }

        function saveLab() {
            const key = document.getElementById('lab-key').value.trim();
            const model = document.getElementById('lab-model').value.trim();
            if(key) localStorage.setItem('alt_api_key', key);
            if(model) localStorage.setItem('alt_api_model', model);
            showMsg("实验室配置已保存");
        }

        function renderAll() {
            document.getElementById('stat-total').innerText = notes.length;
            const review = document.getElementById('review-card-target');
            if(notes.length > 0) {
                const rand = notes[Math.floor(Math.random() * notes.length)];
                review.innerHTML = `<div class="card"><div class="card-meta"><span>${rand.time}</span></div><div class="card-content">${rand.content}</div></div>`;
            }
        }

        function exportData() {
            const b = new Blob([JSON.stringify(notes)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'alter_backup.json'; a.click();
        }

        function togglePanel(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function showMsg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }

        window.onload = () => {
            if(user) enterApp();
            if(window.lucide) lucide.createIcons();
        }
    </script>
</body>
</html>
