<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter - 自省的空间</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700&display=swap');

        :root {
            --bg: #fdfdfd;
            --sidebar-bg: #f8f8f8;
            --text-main: #1a1a1a;
            --text-dim: #a0a0a0;
            --border: #eeeeee;
            --accent: #000;
            --card-bg: #fff;
            --font-title: 'Ma Shan Zheng', cursive;
            --font-main: 'Noto Serif SC', serif;
            --font-sans: 'Inter', sans-serif;
            --panel-blur: blur(30px) saturate(150%);
            --card-radius: 4px;
            --text-weight: 300;
            --line-height: 1.8;
        }

        .dark-mode {
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --text-main: #d1d1d1;
            --text-dim: #444;
            --border: #1a1a1a;
            --card-bg: #0d0d0d;
            --accent: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; background-size: cover; background-position: center; }

        /* --- 字体强制标准 --- */
        h1, .panel-header h1 { font-family: var(--font-title) !important; font-weight: 400 !important; }
        .card-content, #note-in, #reader-target, #reflect-report, .reply-box, p { font-family: var(--font-main) !important; }

        /* --- 认证界面 --- */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-align: center; }
        .auth-box { width: 320px; padding: 40px; }
        .auth-logo { font-family: var(--font-title); font-size: 56px; margin-bottom: 20px; letter-spacing: 6px; }

        /* --- 导航侧边栏 --- */
        nav { width: 56px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 0; z-index: 2000; flex-shrink: 0; }
        .logo { width: 22px; height: 22px; margin-bottom: 50px; cursor: pointer; color: var(--accent); }
        .nav-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; position: relative; }
        .nav-link.active { color: var(--accent); }
        .nav-link.active::after { content: ''; position: absolute; right: -28px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        /* --- 主内容画布 --- */
        main { flex: 1; height: 100%; overflow-y: auto; padding: 60px 5%; scroll-behavior: smooth; position: relative; max-width: 1600px; margin: 0 auto; }
        header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 60px; padding: 0 20px; }
        header h1 { font-size: 40px; color: var(--accent); }
        .view-subtitle { font-size: 8px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }

        /* --- 稳定版瀑布流 --- */
        .grid { column-count: 3; column-gap: 30px; padding: 0 20px; }
        @media (max-width: 1400px) { .grid { column-count: 2; } }
        @media (max-width: 900px) { .grid { column-count: 1; } }

        /* --- 卡片样式 --- */
        .card { break-inside: avoid; margin-bottom: 30px; background: var(--card-bg); border: 1px solid var(--border); padding: 24px; transition: 0.4s ease; cursor: pointer; border-radius: var(--card-radius); }
        .card.tmpl-quote { border-left: 5px solid var(--accent); background: rgba(0,0,0,0.01); }
        .card-content { font-size: 15px; line-height: var(--line-height); font-weight: var(--text-weight); color: var(--text-main); white-space: pre-wrap; max-height: 180px; overflow: hidden; mask-image: linear-gradient(to bottom, black 60%, transparent 100%); }

        /* --- 统一化的 Overlay 头部 --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; padding: 60px 0; backdrop-filter: var(--panel-blur); overflow-y: auto; }
        .overlay-content { max-width: 900px; margin: 0 auto; width: 90%; padding-bottom: 120px; }
        .panel-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .panel-header h1 { font-size: 32px; color: var(--accent); }
        .panel-subtitle { font-size: 8px; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }
        .close-btn { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); cursor: pointer; font-weight: 700; text-transform: uppercase; }

        /* --- 移动端深度适配 --- */
        @media (max-width: 768px) {
            nav { width: 46px !important; }
            main { padding: 40px 10px !important; }
            .grid { padding: 0 10px; }
            .panel-header h1 { font-size: 24px; }
            .ctrl-row { flex-direction: column !important; gap: 20px !important; }
            .soul-mode-btn { width: 100% !important; }
        }

        /* --- 相机 z-index 补丁 --- */
        #cam-overlay { background: #000; z-index: 9999 !important; display: none; align-items: center; justify-content: center; }
        .shutter-ring { width: 70px; height: 70px; border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-ring::after { content: ''; width: 55px; height: 55px; background: #fff; border-radius: 50%; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">Alter.</div>
            <input type="text" id="user-name-in" class="input-line" style="color:#fff; border-color:#333; text-align:center;" placeholder="在此输入登录花名...">
            <button class="btn-black" style="background:#fff; color:#000; width:100%; border-radius:20px;" onclick="enterApp()">连接灵魂</button>
        </div>
    </div>

    <nav>
        <div class="logo" onclick="switchView('home', this)"><svg viewBox="0 0 100 100" fill="none"><path d="M50 20L80 80H20L50 20Z" stroke="currentColor" stroke-width="4"/></svg></div>
        <div class="nav-link active" onclick="switchView('home', this)"><i data-lucide="home"></i></div>
        <div class="nav-link" onclick="switchView('timeline', this)"><i data-lucide="layout"></i></div>
        <div class="nav-link" onclick="handleVaultAccess(this)"><i data-lucide="sparkles"></i></div>
        <div class="nav-link" onclick="togglePanel('reflect-overlay')"><i data-lucide="scan-eye"></i></div>
        <div class="nav-link" onclick="togglePanel('lab-overlay')"><i data-lucide="beaker"></i></div>
        <div style="flex:1"></div>
        <div class="nav-link" onclick="togglePanel('editor-overlay')"><i data-lucide="feather"></i></div>
        <div class="nav-link" onclick="togglePanel('settings-overlay')"><i data-lucide="settings"></i></div>
    </nav>

    <main id="main">
        <header>
            <div>
                <h1 id="view-title">他我笔记</h1>
                <p class="view-subtitle" id="view-subtitle">DASHBOARD / 概览</p>
            </div>
            <button id="synth-btn" class="btn-black" style="display:none; padding:8px 16px; font-size:9px;" onclick="synthesize()">碎片合成</button>
        </header>

        <div id="dash-view-container">
            <div class="grid" style="column-count: 2;">
                <div class="card tmpl-quote">
                    <p style="font-size: 8px; opacity: 0.5;">TODAY'S ARCHIVE</p>
                    <p id="count-today" style="font-family: var(--font-title); font-size: 48px;">0</p>
                </div>
                <div class="card tmpl-quote">
                    <p style="font-size: 8px; opacity: 0.5;">CURRENT PERSONA</p>
                    <p id="current-user-tag" style="font-family: var(--font-title); font-size: 48px;">UNSET</p>
                </div>
            </div>
            <div id="review-box" style="margin-top: 40px;"></div>
        </div>

        <div id="timeline-container" style="display:none;">
            <div class="grid" id="note-grid"></div>
        </div>
    </main>

    <div id="reflect-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header">
                <div><h1>他我笔记</h1><p class="panel-subtitle">心灵回想 / SOUL REFLECTION</p></div>
                <span class="close-btn" onclick="closeOverlay('reflect-overlay')">CLOSE</span>
            </div>
            <div id="reflect-report" style="font-size:18px; line-height:2.2;">选择感应模式，刺破文字表象。</div>
        </div>
    </div>

    <div id="lab-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header">
                <div><h1>他我笔记</h1><p class="panel-subtitle">实验室 / LABORATORY</p></div>
                <span class="close-btn" onclick="closeOverlay('lab-overlay')">CLOSE</span>
            </div>
            <div class="section-block">
                <h3>装修实验室</h3>
                <input type="text" id="custom-bg-url" class="input-line" placeholder="粘贴自定义背景 URL..." style="margin-bottom:20px;">
                <button class="btn-black" onclick="setAppBg()">应用背景</button>
            </div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header">
                <div><h1>他我笔记</h1><p class="panel-subtitle">个人中心 / IDENTITY</p></div>
                <span class="close-btn" onclick="closeOverlay('settings-overlay')">CLOSE</span>
            </div>
            <div class="section-block">
                <h3>安全机制</h3>
                <input type="password" id="pass-note" class="input-line" placeholder="APP 访问锁定 PIN (留空则不锁定)" onchange="saveSec()">
            </div>
            <button class="btn-black" style="width:100%" onclick="dlData()">导出备份 (.JSON)</button>
        </div>
    </div>

    <div id="cam-overlay" class="overlay">
        <video id="v-stream" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        <div style="position:absolute; bottom:50px; width:100%; display:flex; justify-content:center;">
            <div class="shutter-ring" onclick="snap()"></div>
        </div>
        <div onclick="camOff()" style="position:fixed; top:40px; right:40px; cursor:pointer; color:#fff;"><i data-lucide="x"></i></div>
    </div>

    <div id="editor-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header">
                <div id="p-sel-box" style="display:flex; gap:12px;"></div>
                <span class="close-btn" onclick="closeOverlay('editor-overlay')">CLOSE</span>
            </div>
            <textarea id="note-in" class="input-line" style="height:350px; font-size:20px; border:none; resize:none;" placeholder="在此刻寻找回声..."></textarea>
            <div id="prevBox" style="display:none; position:relative; margin-bottom:20px;"><img src="" id="pImg" style="width:100%; border-radius:4px;"><div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="killImg()">×</div></div>
            <div style="display:flex; justify-content: space-between; border-top:1px solid var(--border); padding-top:30px;">
                <i data-lucide="camera" onclick="camOn()" style="cursor:pointer;"></i>
                <button class="btn-black" onclick="save()">封存回响</button>
            </div>
        </div>
    </div>

    <script>
        const FIXED_P = [{n:"他我",i:"🎭"},{n:"乌鸦",i:"🐦"},{n:"影子",i:"🐍"}];
        let notes = JSON.parse(localStorage.getItem('alter_v51_data')) || [], sec = JSON.parse(localStorage.getItem('alter_v51_sec')) || { v: "", n: "" };
        let user = localStorage.getItem('alter_v51_user') || "", viewMode = 'home', activeP = FIXED_P[0], b64 = "", stream = null;

        function init() { 
            lucide.createIcons(); 
            if(!user) document.getElementById('auth-screen').style.display='flex'; 
            else enterApp(user); 
        }

        function enterApp(name) {
            const n = name || document.getElementById('user-name-in').value.trim();
            if(!n) return;
            if (sec.n) { const pin = prompt("请输入访问 PIN："); if (pin !== sec.n) return alert("验证失败"); }
            user = n; localStorage.setItem('alter_v51_user', user);
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('current-user-tag').innerText = user;
            renderAll();
        }

        function renderAll() { renderGrid(); renderSwitcher(); updateStats(); renderDailyReview(); lucide.createIcons(); }
        function updateStats() { document.getElementById('count-today').innerText = notes.filter(n => n.time === new Date().toLocaleDateString()).length; }
        function renderSwitcher() { document.getElementById('p-sel-box').innerHTML = FIXED_P.map(p => `<div style="font-size:10px; cursor:pointer; opacity:${activeP.n===p.n?'1':'0.4'}" onclick="activeP=FIXED_P.find(x=>x.n==='${p.n}'); renderSwitcher();">${p.i} ${p.n}</div>`).join(''); }

        function save() {
            const t = document.getElementById('note-in').value.trim(); if(!t && !b64) return closeOverlay('editor-overlay');
            notes.unshift({ id:Date.now(), content:t, image:b64, persona:activeP.n, i:activeP.i, time:new Date().toLocaleDateString() });
            localStorage.setItem('alter_v51_data', JSON.stringify(notes)); renderAll(); closeOverlay('editor-overlay');
            document.getElementById('note-in').value=''; b64=""; document.getElementById('prevBox').style.display='none';
        }

        function renderGrid() {
            const grid = document.getElementById('note-grid'); if(!grid) return; grid.innerHTML = '';
            notes.forEach(n => {
                const div = document.createElement('div'); div.className = 'card';
                div.innerHTML = `${n.image?`<img src="${n.image}" style="width:100%; margin-bottom:15px; border-radius:2px;">`:''}<div style="font-size:8px; opacity:0.4; margin-bottom:10px;">${n.i} ${n.persona} / ${n.time}</div><div class="card-content">${n.content}</div>`;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        function renderDailyReview() {
            const box = document.getElementById('review-box'); if(!box || notes.length===0) return;
            const r = notes[Math.floor(Math.random()*notes.length)];
            box.innerHTML = `<h3 style="font-size:10px; letter-spacing:3px; margin-bottom:20px; opacity:0.5;">DAILY RECALL / 每日回顾</h3><div class="card tmpl-quote" style="width:100%"><div class="card-content">${r.content}</div></div>`;
        }

        function switchView(m, el) { viewMode = m; document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); if(el) el.classList.add('active'); document.getElementById('dash-view-container').style.display = m==='home'?'block':'none'; document.getElementById('timeline-container').style.display = m==='home'?'none':'block'; document.getElementById('view-subtitle').innerText = m.toUpperCase(); renderGrid(); }
        function togglePanel(id) { document.querySelectorAll('.overlay').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='flex'; lucide.createIcons(); }
        function closeOverlay(id) { document.getElementById(id).style.display='none'; }
        function saveSec() { sec.n = document.getElementById('pass-note').value; localStorage.setItem('alter_v51_sec', JSON.stringify(sec)); }
        function setAppBg() { const url = document.getElementById('custom-bg-url').value; document.body.style.backgroundImage = `url(${url})`; document.body.style.backgroundSize = "cover"; }
        
        async function camOn() { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); document.getElementById('v-stream').srcObject = stream; document.getElementById('cam-overlay').style.display = 'flex'; }
        function camOff() { if(stream) stream.getTracks().forEach(t=>t.stop()); document.getElementById('cam-overlay').style.display='none'; }
        function snap() { const v = document.getElementById('v-stream'), c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0); b64 = c.toDataURL('image/jpeg'); document.getElementById('pImg').src = b64; document.getElementById('prevBox').style.display = 'block'; camOff(); }
        function killImg() { b64=""; document.getElementById('prevBox').style.display='none'; }
        function dlData() { const b = new Blob([JSON.stringify(notes)], {type:'application/json'}); const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='alter.json'; a.click(); }

        window.addEventListener('load', init);
    </script>
</body>
</html>
