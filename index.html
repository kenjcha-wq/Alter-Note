<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter - 自省的空间</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700&display=swap');

        :root {
            --bg: #fdfdfd;
            --sidebar-bg: #f8f8f8;
            --text-main: #1a1a1a;
            --text-dim: #a0a0a0;
            --border: #eeeeee;
            --accent: #000;
            --card-bg: #fff;
            --font-title: 'Ma+Shan+Zheng', cursive;
            --font-main: 'Noto+Serif+SC', serif;
            --font-sans: 'Inter', sans-serif;
            --panel-blur: blur(30px) saturate(150%);
            --card-radius: 4px;
            --text-weight: 300;
            --line-height: 1.8;
        }

        .dark-mode {
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --text-main: #d1d1d1;
            --text-dim: #444;
            --border: #1a1a1a;
            --card-bg: #0d0d0d;
            --accent: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; }

        /* --- 认证 --- */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; }
        .auth-box { width: 320px; padding: 40px; text-align: center; }
        .auth-logo { font-family: 'Ma Shan Zheng'; font-size: 56px; margin-bottom: 20px; letter-spacing: 6px; }

        /* --- 导航 --- */
        nav { width: 56px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 40px 0; z-index: 2000; flex-shrink: 0; }
        @media (max-width: 768px) { nav { width: 50px; padding: 20px 0; } }
        .nav-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; position: relative; }
        .nav-link.active { color: var(--accent); }
        .nav-link.active::after { content: ''; position: absolute; right: -25px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        /* --- 主内容 --- */
        main { flex: 1; height: 100%; overflow-y: auto; padding: 60px 10%; position: relative; scroll-behavior: smooth; }
        @media (max-width: 768px) { main { padding: 40px 15px; } }
        header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 60px; }
        header h1 { font-family: 'Ma Shan Zheng'; font-size: 40px; font-weight: 400; color: var(--accent); }

        .grid { column-count: 3; column-gap: 40px; }
        @media (max-width: 1400px) { .grid { column-count: 2; } }
        @media (max-width: 768px) { .grid { column-count: 1; } }

        /* --- 卡片 --- */
        .card { break-inside: avoid; margin-bottom: 40px; background: var(--card-bg); border: 1px solid var(--border); padding: 24px; border-radius: var(--card-radius); cursor: pointer; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-4px); }
        .card-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; margin-bottom: 20px; filter: grayscale(100%); border-radius: 2px; }
        .card.tmpl-quote { border-left: 5px solid var(--accent); background: rgba(0,0,0,0.01); }
        .card-meta { font-size: 8px; color: var(--text-dim); margin-bottom: 15px; display: flex; justify-content: space-between; font-weight: 700; text-transform: uppercase; }
        .card-content { font-family: 'Noto Serif SC'; font-size: 15px; line-height: 1.8; color: var(--text-main); white-space: pre-wrap; max-height: 150px; overflow: hidden; mask-image: linear-gradient(to bottom, black 70%, transparent 100%); }
        .card-footer { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .footer-btn { background: none; border: none; color: var(--text-dim); font-size: 9px; display: flex; align-items: center; gap: 4px; cursor: pointer; }

        /* --- 覆盖层 --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; overflow-y: auto; }
        #cam-overlay { z-index: 9000; background: #000; display: none; }
        .overlay-content { max-width: 800px; margin: 0 auto; width: 90%; padding: 60px 0; }
        .panel-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .close-btn { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); cursor: pointer; text-transform: uppercase; font-weight: 700; }

        /* --- 互动组件 --- */
        .reply-box { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.02); border-radius: 4px; font-size: 13px; line-height: 1.6; }
        .p-picker { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .p-chip { font-size: 10px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; opacity: 0.5; white-space: nowrap; }
        .p-chip.active { opacity: 1; border-color: var(--accent); color: var(--accent); font-weight: 700; background: rgba(0,0,0,0.02); }

        /* --- 相机 --- */
        .cam-controls { position: absolute; bottom: 50px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 9100; }
        .shutter-ring { width: 70px; height: 70px; border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .shutter-ring::after { content: ''; width: 55px; height: 55px; background: #fff; border-radius: 50%; }
        .cam-flash { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; display:none; }

        .btn-black { background: var(--accent); color: var(--bg); border: none; padding: 12px 24px; font-size: 10px; font-weight: 700; letter-spacing: 2px; cursor: pointer; }
        .input-line { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 10px 0; color: var(--text-main); margin-bottom: 20px; font-size: 14px; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <div class="auth-logo">Alter.</div>
            <p style="font-size:10px; letter-spacing:5px; opacity:0.5; margin-bottom:50px;">PERSONAL ARCHIVE SYSTEM</p>
            <input type="text" id="user-name-in" class="input-line" style="color:#fff; text-align:center;" placeholder="输入花名...">
            <button class="btn-black" style="background:#fff; color:#000; width:100%; border-radius:20px;" onclick="enterApp()">连接灵魂</button>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="switchView('home', this)" title="首页"><i data-lucide="home"></i></div>
        <div class="nav-link" onclick="switchView('timeline', this)" title="主页"><i data-lucide="layout"></i></div>
        <div class="nav-link" onclick="handleVaultAccess(this)" title="碎片库"><i data-lucide="sparkles"></i></div>
        <div style="flex:1"></div>
        <div class="nav-link" onclick="togglePanel('editor-overlay')" title="封存"><i data-lucide="feather"></i></div>
        <div class="nav-link" onclick="togglePanel('settings-overlay')" title="设置"><i data-lucide="settings"></i></div>
    </nav>

    <main id="main">
        <header>
            <h1 id="view-title">他我笔记</h1>
            <div id="current-user-tag" style="font-size:10px; opacity:0.5; letter-spacing:2px;"></div>
        </header>

        <div id="dash-view-container">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:20px; margin-bottom:60px;">
                <div style="padding:30px; border:1px solid var(--border);">
                    <h4 style="font-size:8px; opacity:0.5; margin-bottom:10px;">今日独白</h4>
                    <p id="count-today" style="font-family:'Ma Shan Zheng'; font-size:32px;">0</p>
                </div>
                <div style="padding:30px; border:1px solid var(--border);">
                    <h4 style="font-size:8px; opacity:0.5; margin-bottom:10px;">系统状态</h4>
                    <p style="font-family:'Ma Shan Zheng'; font-size:32px;">活跃</p>
                </div>
            </div>
            <div id="review-box"></div>
        </div>

        <div id="timeline-container" style="display:none;">
            <div class="grid" id="note-grid"></div>
        </div>
    </main>

    <div id="editor-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header"><div id="p-sel-box" style="display:flex; gap:15px;"></div><span class="close-btn" onclick="closeOverlay('editor-overlay')">CLOSE</span></div>
            <textarea id="note-in" class="input-line" style="height:300px; font-family:'Noto Serif SC'; font-size:18px; line-height:2; border:none; resize:none;" placeholder="在此刻寻找回声..."></textarea>
            <div id="prevBox" style="display:none; margin-bottom:20px; position:relative;">
                <img src="" id="pImg" style="width:100%; border-radius:4px;">
                <div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:#fff; border-radius:50%; width:30px; height:30px; text-align:center; line-height:30px; cursor:pointer;" onclick="killImg()">×</div>
            </div>
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <div style="display:flex; gap:30px;">
                    <i data-lucide="camera" onclick="camOn()" style="cursor:pointer; color:var(--text-dim)"></i>
                    <i data-lucide="shield" id="vaultToggle" onclick="toggleVault()" style="cursor:pointer; color:var(--text-dim)"></i>
                </div>
                <button class="btn-black" onclick="save()">封存回响</button>
            </div>
        </div>
    </div>

    <div id="reader-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header"><h2 style="font-family:'Ma Shan Zheng';">内容回想</h2><span class="close-btn" onclick="closeOverlay('reader-overlay')">BACK</span></div>
            <div id="reader-target" style="font-family:'Noto Serif SC'; font-size:18px; line-height:2.2;"></div>
            <div style="margin-top:50px; padding-top:40px; border-top:1px solid var(--border);">
                <div id="replies-box"></div>
                <div style="margin-top:40px; background:rgba(0,0,0,0.01); padding:20px; border-radius:4px;">
                    <div id="r-p-picker" class="p-picker"></div>
                    <input type="text" id="comIn" class="input-line" placeholder="写下回响...">
                    <button class="btn-black" id="sendBtn" style="width:100%;">同步回响</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <div class="overlay-content">
            <div class="panel-header"><h2>个人设置</h2><span class="close-btn" onclick="closeOverlay('settings-overlay')">CLOSE</span></div>
            <div style="margin-bottom:40px;">
                <h3 style="font-size:10px; opacity:0.5; margin-bottom:20px;">安全机制</h3>
                <div style="margin-bottom:20px;">
                    <label style="font-size:12px;">碎片库访问密码</label>
                    <input type="password" id="pass-vault" class="input-line" onchange="saveSec()">
                </div>
            </div>
            <div style="margin-bottom:40px;">
                <h3 style="font-size:10px; opacity:0.5; margin-bottom:20px;">数据管理</h3>
                <button class="btn-black" style="width:100%; background:transparent; border:1px solid var(--border); color:var(--text-main);" onclick="dlData()">导出备份 (.JSON)</button>
            </div>
        </div>
    </div>

    <div id="cam-overlay">
        <div class="cam-flash" id="flash-effect"></div>
        <div onclick="camOff()" style="position:fixed; top:30px; right:30px; z-index:9999; cursor:pointer;"><i data-lucide="x" color="#fff" size="32"></i></div>
        <video id="v-stream" autoplay playsinline style="width:100%; height:100%; object-fit:cover; background:#000;"></video>
        <div class="cam-controls">
            <div class="shutter-ring" onclick="snap()"></div>
        </div>
        <canvas id="v-canvas" style="display:none;"></canvas>
    </div>

    <script>
        const FIXED_P = [{n:"他我",i:"🎭"},{n:"乌鸦",i:"🐦"},{n:"影子",i:"🐍"}];
        let notes = JSON.parse(localStorage.getItem('alter_v51_data')) || [];
        let sec = JSON.parse(localStorage.getItem('alter_v51_sec')) || { v: "" };
        let user = localStorage.getItem('alter_v51_user') || "";
        let viewMode = 'home', activeP = FIXED_P[0], commP = FIXED_P[0], inV = false, b64 = "", stream = null;

        // 初始化
        function init() { 
            lucide.createIcons();
            if(!user) {
                document.getElementById('auth-screen').style.display='flex';
            } else {
                enterApp(user);
            }
        }

        function enterApp(name) {
            user = name || document.getElementById('user-name-in').value.trim();
            if(!user) return;
            localStorage.setItem('alter_v51_user', user);
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('current-user-tag').innerText = `@${user.toUpperCase()}`;
            renderAll();
        }

        function renderAll() {
            renderGrid();
            renderSwitcher();
            updateStats();
            renderDailyReview();
            lucide.createIcons(); // 强制刷新图标
        }

        function renderSwitcher() { 
            document.getElementById('p-sel-box').innerHTML = FIXED_P.map(p => `<span style="font-size:10px; cursor:pointer; opacity:${activeP.n===p.n?'1':'0.4'}" onclick="setActiveP('${p.n}')">${p.i} ${p.n}</span>`).join('');
            const rBox = document.getElementById('r-p-picker');
            if(rBox) rBox.innerHTML = FIXED_P.map(p => `<div class="p-chip ${commP.n===p.n?'active':''}" onclick="setCommP('${p.n}')">${p.i} ${p.n}</div>`).join('');
        }
        window.setActiveP = (n) => { activeP = FIXED_P.find(x=>x.n===n); renderSwitcher(); };
        window.setCommP = (n) => { commP = FIXED_P.find(x=>x.n===n); renderSwitcher(); };

        function updateStats() {
            document.getElementById('count-today').innerText = notes.filter(n => n.time === new Date().toLocaleDateString()).length;
        }

        function save() {
            const t = document.getElementById('note-in').value.trim();
            if(!t && !b64) return closeOverlay('editor-overlay');
            const newNote = {
                id: Date.now(),
                content: t,
                image: b64,
                isVault: inV,
                persona: activeP.n,
                i: activeP.i,
                time: new Date().toLocaleDateString(),
                zs: 0,
                replies: []
            };
            notes.unshift(newNote);
            localStorage.setItem('alter_v51_data', JSON.stringify(notes));
            
            // 重置编辑器
            document.getElementById('note-in').value='';
            b64=""; inV=false;
            document.getElementById('prevBox').style.display='none';
            document.getElementById('vaultToggle').style.color='var(--text-dim)';
            closeOverlay('editor-overlay');
            renderAll();
        }

        function renderGrid() {
            const grid = document.getElementById('note-grid');
            if(!grid) return;
            grid.innerHTML = '<div class="card" onclick="togglePanel(\'editor-overlay\')" style="opacity:0.3; border:1px dashed var(--border); display:flex; align-items:center; justify-content:center; height:100px; font-weight:900;">NEW FRAGMENT</div>';
            
            const list = notes.filter(n => (viewMode === 'vault' ? n.isVault === true : !n.isVault));
            list.forEach(n => {
                const div = document.createElement('div');
                div.className = `card ${n.isVault?'tmpl-quote':''}`;
                div.onclick = () => showNote(n);
                div.innerHTML = `
                    ${n.image?`<img src="${n.image}" class="card-img">`:''}
                    <div class="card-meta"><span>${n.i} ${n.persona}</span><span>${n.time}</span></div>
                    <div class="card-content">${n.content}</div>
                    <div class="card-footer">
                        <div class="footer-btn" onclick="doZap(event, ${n.id})"><i data-lucide="zap" size="10"></i> ${n.zs||0}</div>
                        <div style="font-size:8px; opacity:0.5;">${n.replies?.length||0} ECHOES</div>
                    </div>
                `;
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        function showNote(n) {
            document.getElementById('reader-target').innerHTML = `<p>${n.content}</p>${n.image?`<img src="${n.image}" style="width:100%; margin-top:30px; border-radius:4px;">`:''}`;
            const rBox = document.getElementById('replies-box');
            rBox.innerHTML = (n.replies || []).map(r => `<div class="reply-box"><b>${r.who}:</b> ${r.txt}</div>`).join('') || '<p style="opacity:0.2; font-size:10px; text-align:center;">静候回声</p>';
            
            document.getElementById('sendBtn').onclick = () => {
                const txt = document.getElementById('comIn').value.trim();
                if(!txt) return;
                if(!n.replies) n.replies = [];
                n.replies.push({ who: commP.n, txt: txt });
                localStorage.setItem('alter_v51_data', JSON.stringify(notes));
                document.getElementById('comIn').value='';
                showNote(n);
                renderGrid();
            };
            togglePanel('reader-overlay');
            renderSwitcher();
        }

        function renderDailyReview() {
            const box = document.getElementById('review-box');
            if(!box || notes.length===0) return;
            const r = notes[Math.floor(Math.random()*notes.length)];
            box.innerHTML = `<h3 style="font-size:8px; opacity:0.3; margin-bottom:20px; letter-spacing:3px; text-transform:uppercase;">Daily Recall</h3><div class="card tmpl-quote" style="width:100%" onclick="showNoteById(${r.id})"><div class="card-content">${r.content}</div></div>`;
        }

        // 核心控制
        function toggleVault() { inV=!inV; document.getElementById('vaultToggle').style.color=inV?'var(--accent)':'var(--text-dim)'; }
        function handleVaultAccess(el) { 
            if(sec.v) { 
                const p = prompt("验证碎片库密码:");
                if(p !== sec.v) return;
            } 
            switchView('vault', el); 
        }
        function saveSec() { sec.v = document.getElementById('pass-vault').value; localStorage.setItem('alter_v51_sec', JSON.stringify(sec)); }
        function switchView(m, el) { 
            viewMode = m; 
            document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active')); 
            if(el) el.classList.add('active'); 
            document.getElementById('dash-view-container').style.display = m==='home'?'block':'none'; 
            document.getElementById('timeline-container').style.display = (m==='timeline'||m==='vault')?'block':'none'; 
            document.getElementById('view-title').innerText = m==='vault'?'碎片空间':(m==='timeline'?'主页回响':'他我笔记');
            renderGrid(); 
        }
        function togglePanel(id) { document.querySelectorAll('.overlay').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='flex'; lucide.createIcons(); }
        function closeOverlay(id) { document.getElementById(id).style.display='none'; }
        
        // 相机系统 (物理级修复)
        async function camOn() { 
            try { 
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); 
                document.getElementById('v-stream').srcObject = stream; 
                document.getElementById('cam-overlay').style.display = 'block';
                lucide.createIcons();
            } catch (e) { alert("无法调用相机，请检查权限。"); } 
        }
        function camOff() { if(stream) stream.getTracks().forEach(t=>t.stop()); document.getElementById('cam-overlay').style.display='none'; }
        function snap() { 
            const v = document.getElementById('v-stream'), c = document.getElementById('v-canvas'), flash = document.getElementById('flash-effect');
            flash.style.display = 'block'; flash.style.animation = 'none'; setTimeout(()=>flash.style.display='none', 100);
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0); 
            b64 = c.toDataURL('image/jpeg'); 
            document.getElementById('pImg').src = b64; 
            document.getElementById('prevBox').style.display = 'block'; 
            camOff(); 
        }

        function upFile(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload=(ev)=>{b64=ev.target.result; document.getElementById('pImg').src=b64; document.getElementById('prevBox').style.display='block';}; r.readAsDataURL(f); }
        function killImg() { b64=""; document.getElementById('prevBox').style.display='none'; }
        function doZap(e, id) { e.stopPropagation(); const n = notes.find(x=>x.id===id); if(n){ n.zs=(n.zs||0)+1; localStorage.setItem('alter_v51_data', JSON.stringify(notes)); renderGrid(); } }
        function dlData() { const a = document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(notes)], {type:'application/json'})); a.download=`alter_backup_${new Date().getTime()}.json`; a.click(); }
        function showNoteById(id) { const n = notes.find(x=>x.id===id); if(n) showNote(n); }

        window.addEventListener('load', init);
    </script>
</body>
</html>
