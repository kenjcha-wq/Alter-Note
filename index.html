<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter - 自省的空间</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style id="custom-styles">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;400;700&display=swap');
        :root {
            --bg: #fdfdfd; --sidebar-bg: #f8f8f8; --text-main: #1a1a1a; --text-dim: #a0a0a0;
            --border: #eeeeee; --accent: #000; --card-bg: #fff;
            --font-title: 'Ma_Shan_Zheng', cursive; --font-main: 'Noto Serif SC', serif; --font-sans: 'Inter', sans-serif;
            --panel-blur: blur(30px) saturate(150%); --card-radius: 4px; --text-weight: 300; --line-height: 1.8;
        }
        .dark-mode { --bg: #050505; --sidebar-bg: #0a0a0a; --text-main: #d1d1d1; --text-dim: #444; --border: #1a1a1a; --card-bg: #0d0d0d; --accent: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: var(--font-sans); display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; }
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; text-align: center; }
        .auth-box { width: 280px; padding: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        nav { width: 56px; height: 100%; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 2000; }
        .nav-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-link.active { color: var(--accent); }
        main { flex: 1; height: 100%; overflow-y: auto; padding: 60px 5%; position: relative; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 60px; }
        header h1 { font-family: 'Ma Shan Zheng' !important; font-size: 40px; color: var(--accent); }
        .grid { column-count: 3; column-gap: 40px; }
        @media (max-width: 900px) { .grid { column-count: 1; } }
        .card { break-inside: avoid; margin-bottom: 40px; background: var(--card-bg); border: 1px solid var(--border); padding: 24px; border-radius: var(--card-radius); transition: 0.3s; }
        .card-meta { font-size: 8px; color: var(--text-dim); margin-bottom: 12px; letter-spacing: 1px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: none; flex-direction: column; padding: 60px 0; backdrop-filter: var(--panel-blur); overflow-y: auto; }
        .btn-black { background: var(--accent); color: var(--bg); border: none; padding: 12px 28px; font-size: 9px; cursor: pointer; border-radius: 20px; }
        .input-line { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 14px; color: var(--text-main); margin-bottom: 20px; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 8px 16px; font-size: 9px; border-radius: 20px; z-index: 11000; display: none; }
    </style>
</head>
<body>
    <div id="toast">SYSTEM SYNCED</div>
    <div id="auth-screen">
        <div class="auth-box">
            <div style="font-family:'Ma Shan Zheng'; font-size:72px; margin-bottom:20px;">Alter.</div>
            <input type="text" id="user-name-in" class="input-line" style="color:#fff; text-align:center;" placeholder="输入登录名...">
            <button class="btn-black" style="background:#fff; color:#000; width:100%;" onclick="enterApp()">连接灵魂</button>
        </div>
    </div>
    <nav>
        <div id="cur-login-name" style="font-size:8px; margin-bottom:20px; opacity:0.5;">NIK</div>
        <div class="nav-link active" onclick="switchView('home', this)"><i data-lucide="home"></i></div>
        <div class="nav-link" onclick="switchView('timeline', this)"><i data-lucide="layout"></i></div>
        <div class="nav-link" onclick="handleVaultAccess(this)"><i data-lucide="sparkles"></i></div>
        <div class="nav-link" onclick="togglePanel('editor-overlay')"><i data-lucide="feather"></i></div>
        <div class="nav-link" onclick="togglePanel('lab-overlay')"><i data-lucide="beaker"></i></div>
        <div style="flex:1"></div>
        <div class="nav-link" onclick="togglePanel('settings-overlay')"><i data-lucide="settings"></i></div>
    </nav>
    <main>
        <header>
            <div><h1 id="view-title">他我笔记</h1><p id="view-subtitle" style="font-size:8px; color:var(--text-dim); letter-spacing:2px;">DASHBOARD / 概览</p></div>
            <div id="vault-tabs" style="display:none; gap:15px;">
                <span onclick="switchVaultMode('soul')" style="cursor:pointer; font-size:10px;">心灵碎片</span>
                <span onclick="switchVaultMode('memory')" style="cursor:pointer; font-size:10px;">记忆碎片</span>
            </div>
        </header>
        <div id="home-view">
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:60px;">
                <div style="padding:40px; border:1px solid var(--border); text-align:center;"><h4>碎片总量</h4><p id="stat-total">0</p></div>
                <div style="padding:40px; border:1px solid var(--border); text-align:center;"><h4>化身状态</h4><p>活跃</p></div>
                <div style="padding:40px; border:1px solid var(--border); text-align:center;"><h4>同步节点</h4><p>Cloudflare</p></div>
            </div>
        </div>
        <div id="timeline-view" style="display:none;"><div class="grid" id="note-grid"></div></div>
    </main>

    <div id="editor-overlay" class="overlay"><div style="max-width:800px; margin:0 auto; width:90%;">
        <h2 style="font-family:'Ma Shan Zheng'; font-size:32px; margin-bottom:40px;">封存碎语</h2>
        <textarea id="note-in" class="input-line" style="height:300px; resize:none; font-family:'Noto Serif SC'; font-size:20px;" placeholder="在此刻寻找回声..."></textarea>
        <button class="btn-black" onclick="saveNote()">封存回响</button>
        <button onclick="closeOverlay('editor-overlay')" style="background:none; border:none; margin-left:20px; cursor:pointer; color:var(--text-dim);">取消</button>
    </div></div>

    <div id="lab-overlay" class="overlay"><div style="max-width:800px; margin:0 auto; width:90%;">
        <h2 style="font-family:'Ma Shan Zheng'; font-size:32px; margin-bottom:20px;">实验室</h2>
        <p style="font-size:11px; margin-bottom:40px;">在此配置多模型接口（数据加密存储在本地）</p>
        <input type="password" id="lab-api-key" class="input-line" placeholder="输入 API Key (sk-...)">
        <input type="text" id="lab-api-model" class="input-line" placeholder="默认模型 ID (如 doubao-pro-32k)">
        <button class="btn-black" onclick="saveLab()">保存配置</button>
        <button onclick="closeOverlay('lab-overlay')" style="background:none; border:none; margin-left:20px; cursor:pointer; color:var(--text-dim);">关闭</button>
    </div></div>

    <div id="settings-overlay" class="overlay"><div style="max-width:800px; margin:0 auto; width:90%;">
        <h2 style="font-family:'Ma Shan Zheng'; font-size:32px; margin-bottom:40px;">个人中心</h2>
        <button class="btn-black" style="width:100%; margin-bottom:20px;" onclick="exportData()">导出备份 (.JSON)</button>
        <button class="btn-black" style="width:100%; background:red; color:#fff;" onclick="localStorage.clear(); location.reload();">重置所有数据</button>
        <p onclick="closeOverlay('settings-overlay')" style="text-align:center; margin-top:40px; font-size:10px; cursor:pointer; opacity:0.5;">CLOSE</p>
    </div></div>

    <script>
        let notes = JSON.parse(localStorage.getItem('alter_v52_data')) || [];
        let sec = JSON.parse(localStorage.getItem('alter_v52_sec')) || { v: "", n: "" };
        let user = localStorage.getItem('alter_v52_user') || "";
        let viewMode = 'home';

        function enterApp() {
            const n = document.getElementById('user-name-in').value.trim() || user;
            if(!n) return alert("请输入登录名");
            if(sec.n && !user && prompt("PIN:") !== sec.n) return;
            user = n; localStorage.setItem('alter_v52_user', user);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('cur-login-name').innerText = user;
            renderAll();
        }

        function switchView(mode, el) {
            viewMode = mode;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');
            document.getElementById('home-view').style.display = (mode === 'home' ? 'block' : 'none');
            document.getElementById('timeline-view').style.display = (mode !== 'home' ? 'block' : 'none');
            document.getElementById('view-title').innerText = (mode === 'home' ? "他我笔记" : "碎语时光");
            document.getElementById('vault-tabs').style.display = (mode === 'vault' ? 'flex' : 'none');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('note-grid');
            let list = notes.filter(n => viewMode === 'vault' ? n.isVault : !n.isVault);
            grid.innerHTML = list.map(n => `<div class="card"><div class="card-meta"><span>${n.time}</span></div><div style="font-family:'Noto Serif SC'; font-size:15px; line-height:1.8;">${n.content}</div></div>`).join('') || '<p style="opacity:0.2;">此刻虚无。</p>';
        }

        function saveNote() {
            const txt = document.getElementById('note-in').value.trim();
            if(!txt) return;
            notes.unshift({ id: Date.now(), content: txt, time: new Date().toLocaleString(), isVault: false });
            localStorage.setItem('alter_v52_data', JSON.stringify(notes));
            document.getElementById('note-in').value = "";
            showMsg("已封存"); renderAll(); closeOverlay('editor-overlay');
        }

        function saveLab() {
            localStorage.setItem('alt_api_key', document.getElementById('lab-api-key').value);
            localStorage.setItem('alt_api_model', document.getElementById('lab-api-model').value);
            showMsg("实验室配置已保存");
        }

        function handleVaultAccess(el) {
            if(sec.v && prompt("验证碎片库密码：") !== sec.v) return;
            switchView('vault', el);
        }

        function renderAll() { 
            document.getElementById('stat-total').innerText = notes.length; 
            renderGrid(); 
        }

        function exportData() {
            const b = new Blob([JSON.stringify(notes)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'alter_backup.json'; a.click();
        }

        function togglePanel(id) { document.getElementById(id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function showMsg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        window.onload = () => { if(user) enterApp(); lucide.createIcons(); }
    </script>
</body>
</html>
